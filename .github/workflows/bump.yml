name: Bump

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in infra/
        run: |
          SHA="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          for service in api frontend worker; do
            sed -i "s|ghcr.io/richonn/kubeforge-${service}:.*|ghcr.io/richonn/kubeforge-${service}:${SHA}|" \
              infra/base/${service}/deployment.yml
          done

      - name: Commit and push
        run: |
          SHA="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/base/api/deployment.yml infra/base/frontend/deployment.yml infra/base/worker/deployment.yml
          git diff --cached --quiet || git commit -m "chore: bump image tags to ${SHA}"
          git push
