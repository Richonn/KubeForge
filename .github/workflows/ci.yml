name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build.yml

  scan:
    if: github.event_name == 'push'
    needs: build
    uses: ./.github/workflows/scan.yml
    secrets: inherit

  push:
    if: github.event_name == 'push'
    needs: scan
    uses: ./.github/workflows/push.yml
    secrets: inherit
