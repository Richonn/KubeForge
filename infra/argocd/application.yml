apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubeforge
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Richonn/KubeForge
    targetRevision: main
    path: infra/base
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
