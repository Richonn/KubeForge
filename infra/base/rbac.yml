apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-api
  namespace: default

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-frontend
  namespace: default

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-worker
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: role-api
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rb-api
  namespace: default
subjects:
  - kind: ServiceAccount
    name: sa-api
    namespace: default
roleRef:
  kind: Role
  name: role-api
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: role-worker
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rb-worker
  namespace: default
subjects:
  - kind: ServiceAccount
    name: sa-worker
    namespace: default
roleRef:
  kind: Role
  name: role-worker
  apiGroup: rbac.authorization.k8s.io

---
